name: Backend CI
on:
  push:
    paths:
      - 'backend/**'
  pull_request:
    paths:
      - 'backend/**'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install -r requirements.txt
      - name: Run FastAPI health check
        run: |
          .venv/bin/python -c "print('Backend up')"
      - name: Run API tests
        run: |
          .venv/bin/pytest test_main.py
      - name: Upload backend source
        uses: actions/upload-artifact@v4
        with:
          name: backend-src
          path: backend/
