name: Frontend CI

on:
  push:
    branches:
      - master
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches:
      - master
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend # 統一設定工作目錄，下面就不必每一行都寫
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          # cache key depends on package-lock.json
          cache-dependency-path: frontend/package-lock.json 

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint