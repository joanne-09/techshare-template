name: Frontend CI
on:
  push:
    paths:
      - 'frontend/**'
  pull_request:
    paths:
      - 'frontend/**'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
        working-directory: frontend
      - name: Build project
        run: npm run build
        working-directory: frontend
      - name: Upload production-ready build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
